<div class="dashboard page">

  <!-- Date navigation -->
  <div class="date-nav">
    <button mat-icon-button (click)="navigateDay(-1)">
      <mat-icon>chevron_left</mat-icon>
    </button>
    <span class="date-label">
      {{ currentDate() === today ? "Aujourd'hui" : currentDate() }}
    </span>
    <button mat-icon-button (click)="navigateDay(1)" [disabled]="currentDate() === today">
      <mat-icon>chevron_right</mat-icon>
    </button>
  </div>

  <ng-container *ngIf="summary() as s">

    <!-- Calories ring -->
    <div class="ring-section">
      <app-calories-ring [consumed]="s.totals.calories" [goal]="s.goals?.calories ?? 2000" />
    </div>

    <!-- Macros -->
    <div class="card macros-card">
      <app-macro-bar
        label="Protéines"   [consumed]="s.totals.proteins" [goal]="s.goals?.proteins ?? 150" color="#4A8FD4" />
      <app-macro-bar
        label="Glucides"    [consumed]="s.totals.carbs"    [goal]="s.goals?.carbs    ?? 250" color="#F0A500" />
      <app-macro-bar
        label="Lipides"     [consumed]="s.totals.fat"      [goal]="s.goals?.fat      ?? 65"  color="#E8702A" />
      <app-macro-bar
        label="Fibres"      [consumed]="s.totals.fiber"    [goal]="s.goals?.fiber    ?? 25"  color="#52B080" />
    </div>

    <!-- By meal type -->
    <p class="section-label">Repas</p>
    <div class="meal-types">
      <app-meal-type-card
        *ngFor="let type of mealTypes"
        [mealType]="mealTypeLabels[type]"
        [mealTypeKey]="type"
        [totals]="s.byMealType[type] ?? emptyNutriMap"
      />
    </div>

    <!-- Activities -->
    <ng-container *ngIf="s.activities.length">
      <p class="section-label">Activités</p>
      <div class="card activities-card">
        <div class="activity-row" *ngFor="let a of s.activities">
          <div class="activity-icon"><mat-icon>directions_run</mat-icon></div>
          <span class="activity-name">{{ a.name }}</span>
          <span class="activity-kcal">−{{ a.caloriesBurned }}&nbsp;kcal</span>
        </div>
      </div>
    </ng-container>

    <!-- FAB add meal -->
    <div class="fab-wrap">
      <button mat-fab extended color="primary" (click)="addMeal()">
        <mat-icon>add</mat-icon>
        Ajouter un repas
      </button>
    </div>

  </ng-container>
</div>
